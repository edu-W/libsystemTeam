<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>重邮图书馆 · 座位预约登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f5fb 0%, #e6eef9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 30, 60, 0.25), 0 2px 10px 0 rgba(0, 0, 0, 0.05);
            padding: 2.5rem 1.8rem 2rem 1.8rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-badge {
            width: 180px;
            height: 80px;
            background: transparent;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.9rem;
        }

        .logo-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .school-title {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #1e4a6f;
            background: rgba(255, 255, 255, 0.7);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            margin-top: 0.25rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
        }

        .school-title span {
            font-weight: 300;
            color: #487595;
        }

        .system-name {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            color: #0b3b5c;
            margin: 0.7rem 0 0.25rem 0;
            letter-spacing: -0.3px;
        }

        .system-sub {
            font-size: 0.8rem;
            color: #4d6a82;
            text-align: center;
            border-bottom: 1px dashed #bdd3e8;
            padding-bottom: 1.5rem;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            margin-bottom: 1.1rem;
            border: 1.5px solid #dbe5f0;
            transition: all 0.15s ease;
            box-shadow: 0 2px 6px rgba(0, 20, 40, 0.02);
        }

        .input-group:focus-within {
            border-color: #0b3b5c;
            box-shadow: 0 4px 12px rgba(11, 59, 92, 0.12);
        }

        .input-group i {
            color: #678ca0;
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .input-group input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            font-weight: 500;
            background: transparent;
            padding: 0.4rem 0;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: #a8bccf;
            font-weight: 400;
            font-size: 0.95rem;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.8rem 0 1.8rem;
            font-size: 0.9rem;
            color: #2e577a;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .options input[type="checkbox"] {
            accent-color: #0b3b5c;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .options a {
            color: #1e6b9b;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed #9bb8d4;
        }

        .options a:hover {
            color: #0b3b5c;
            border-bottom-style: solid;
        }

        .login-btn {
            background: #0b3b5c;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 0;
            border-radius: 56px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 20px -7px #0b3b5c;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 1.3rem;
        }

        .login-btn:hover {
            background: #124f7a;
            transform: translateY(-2px);
            box-shadow: 0 18px 25px -10px #124f7a;
        }

        .login-btn:active {
            transform: translateY(1px);
            box-shadow: 0 8px 15px -6px #0b3b5c;
        }

        .role-hint {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            color: #5e7c9c;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.8rem;
        }

        .role-hint span {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #e9f0f7;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .role-hint span i {
            font-size: 0.9rem;
        }

        .internal-footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7f99b3;
            border-top: 1px solid #d7e2ed;
            padding-top: 1.3rem;
            margin-top: 0.8rem;
            letter-spacing: 0.3px;
            font-weight: 400;
        }

        @media (max-width: 400px) {
            .login-card {
                padding: 1.8rem 1.2rem 1.5rem;
            }

            .logo-badge {
                width: 75px;
                height: 75px;
            }

            .logo-badge i {
                font-size: 2.8rem;
            }

            .system-name {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 320px) {
            .options {
                flex-direction: column;
                gap: 0.6rem;
                align-items: flex-start;
            }

            .role-hint {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-badge">
                <img src="logo.jpg" alt="重庆邮电大学" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="school-title">
                重庆邮电大学 <span>· 图书馆</span>
            </div>
        </div>

        <h1 class="system-name">座位预约系统</h1>
        <div class="system-sub">
            <i class="fas fa-qrcode" style="margin-right: 6px;"></i> 扫码 · 预约 · 暂离 · 信用
        </div>

        <form action="#" method="post" onsubmit="return false;">
            <div class="role-hint">
                <div style="width: 100%; text-align: center; margin-bottom: 1.2rem;">
                    <div style="font-size: 0.9rem; color: #5e7c9c; font-weight: 600; margin-bottom: 0.8rem;">请先选择身份
                    </div>
                    <div style="display: flex; justify-content: center; gap: 1.5rem;">
                        <span class="role-btn" data-role="student" style="cursor: pointer; opacity: 0.6;"><i
                                class="fas fa-graduation-cap"></i> 学生</span>
                        <span class="role-btn" data-role="admin" style="cursor: pointer; opacity: 0.6;"><i
                                class="fas fa-user-tie"></i> 管理员</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" id="accountInput" placeholder="统一认证码" value="" autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="passwordInput" placeholder="初始密码为身份证后六位" value="">
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" id="rememberPwd" checked> <span>记住密码</span>
                </label>
            </div>

            <button class="login-btn" type="button">登 录</button>
        </form>

        <div id="errorToast" style="
            position: fixed;
            top: 20px;
            left: 50%;          
            transform: translateX(-50%);  
            background: #f44336;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: none;
            z-index: 9999;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
            animation: slideIn 0.3s ease;
        ">
            <span id="errorMsg"></span>
        </div>

        <script>
            // 修复：移除APP_CONFIG里的多余空格
            const APP_CONFIG = {
                API_BASE_URL: 'http://localhost:8080/api',
                STORAGE_KEY_TOKEN: 'lib_token',
                STORAGE_KEY_ROLE: 'lib_role',
                STORAGE_KEY_USER_ID: 'lib_user_id',
                STORAGE_KEY_ACCOUNT: 'lib_account',
                STORAGE_KEY_NAME: 'lib_name'
            };

            let selectedRole = null;

            function showError(message) {
                const errorToast = document.getElementById('errorToast');
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = message;
                errorToast.style.display = 'block';
                setTimeout(() => {
                    errorToast.style.display = 'none';
                }, 3000);
            }

            function md5Hash(str) {
                return CryptoJS.MD5(str).toString();
            }

            function validateForm(account, password) {
                if (!account || !account.trim()) {
                    showError('请输入统一认证码');
                    return false;
                }
                if (account.length < 6) {
                    showError('统一认证码长度不符（至少6位）');
                    return false;
                }
                if (!password || !password.trim()) {
                    showError('请输入密码');
                    return false;
                }
                if (password.length < 6) {
                    showError('密码至少6位');
                    return false;
                }
                if (!selectedRole) {
                    showError('请先选择身份（学生/管理员）');
                    return false;
                }
                return true;
            }

            // 优化：登录成功后存储完整用户信息
            async function loginToBackend(account, password) {
                const testUsers = [
                    { account: "2024001", password: "111111", role: "student", name: "王小明" },
                    { account: "2024002", password: "222222", role: "student", name: "周小雨" },
                    { account: "2024003", password: "333333", role: "student", name: "刘小涵" },
                    { account: "2024004", password: "444444", role: "student", name: "阳小宇" },
                    { account: "000001", password: "123456", role: "admin", name: "斯律亥" }
                ];
               
                const user = testUsers.find(u => u.account === account && u.password === password);
                if (!user) {
                    showError("账号或密码错误");
                    return;
                }
                if (user.role !== selectedRole) {
                    showError("用户不匹配！");
                    return;
                }
            

                // 保存完整用户信息到本地存储
                localStorage.setItem(APP_CONFIG.STORAGE_KEY_TOKEN, "fake_token_" + Date.now());
                localStorage.setItem(APP_CONFIG.STORAGE_KEY_USER_ID, "user_" + Date.now());
                localStorage.setItem(APP_CONFIG.STORAGE_KEY_ROLE, user.role);
                localStorage.setItem(APP_CONFIG.STORAGE_KEY_ACCOUNT, account);
                localStorage.setItem(APP_CONFIG.STORAGE_KEY_NAME, user.name);
                
                // 记住密码功能
                if (document.getElementById('rememberPwd').checked) {
                    localStorage.setItem('saved_pwd_' + account, password);
                } else {
                    localStorage.removeItem('saved_pwd_' + account);
                }

                alert(`登录成功！将跳转到${user.role === 'student' ? '座位地图' : '管理员后台'}...`);
                setTimeout(() => redirectAfterLogin(), 800);
            }

            function redirectAfterLogin() {
                const role = localStorage.getItem(APP_CONFIG.STORAGE_KEY_ROLE);
                if (role === 'student') {
                    window.location.href = 'seat-map.html';
                } else if (role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    showError('未知用户角色');
                }
            }

            // 优化角色选择交互
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    selectedRole = this.dataset.role;
                    document.querySelectorAll('.role-btn').forEach(b => {
                        b.style.background = '#e9f0f7';
                        b.style.color = '#5e7c9c';
                        b.style.opacity = '0.6';
                        b.style.fontWeight = '500';
                        b.style.boxShadow = 'none';
                    });
                    this.style.background = '#0b3b5c';
                    this.style.color = '#FFD966';
                    this.style.opacity = '1';
                    this.style.fontWeight = '600';
                    this.style.boxShadow = '0 4px 12px rgba(11, 59, 92, 0.2)';
                });

                btn.addEventListener('mouseover', function () {
                    if (selectedRole !== this.dataset.role) {
                        this.style.opacity = '0.8';
                        this.style.transform = 'scale(1.08)';
                    }
                });

                btn.addEventListener('mouseout', function () {
                    if (selectedRole !== this.dataset.role) {
                        this.style.opacity = '0.6';
                        this.style.transform = 'scale(1)';
                    }
                });
            });

            // 登录按钮点击事件
            document.querySelector('.login-btn').addEventListener('click', function () {
                const account = document.getElementById('accountInput').value.trim();
                const password = document.getElementById('passwordInput').value.trim();
                if (validateForm(account, password)) {
                    loginToBackend(account, password);
                }
            });

            // 回车登录
            document.getElementById('passwordInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    document.querySelector('.login-btn').click();
                }
            });

            // 页面加载：自动填充记住的账号密码
            window.addEventListener('load', function () {
                const savedAccount = localStorage.getItem(APP_CONFIG.STORAGE_KEY_ACCOUNT);
                if (savedAccount) {
                    document.getElementById('accountInput').value = savedAccount;
                    const savedPwd = localStorage.getItem('saved_pwd_' + savedAccount);
                    if (savedPwd) {
                        document.getElementById('passwordInput').value = savedPwd;
                        document.getElementById('rememberPwd').checked = true;
                    }
                }

                // 已登录状态检测
                const token = localStorage.getItem(APP_CONFIG.STORAGE_KEY_TOKEN);
                const role = localStorage.getItem(APP_CONFIG.STORAGE_KEY_ROLE);
                if (token && role) {
                    if (confirm('检测到已登录状态，是否直接跳转？')) {
                        redirectAfterLogin();
                    }
                }
            });

            // 动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(400px); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        </script>

        <div class="internal-footer">
            V1.0.0 · 重邮图书馆 · 2026<br />
            版权所有 &copy; 2026 TFgirls
        </div>
    </div>
</body>

</html>
